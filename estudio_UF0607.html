<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examen tipo test · UF0607</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#171a1f;
  --panel:#22262e;
  --panel-2:#262b34;
  --steel:#3a4150;
  --ink:#e9ebef;
  --ink-dim:#9aa1ad;
  --ink-faint:#646c7a;
  --arc:#ff6a1a;
  --arc-glow:#ff9a52;
  --ok:#3ecf8e;
  --ok-bg:#16241d;
  --bad:#ef5b5b;
  --bad-bg:#2a1c1c;
  --warn:#e2b13c;
  --shadow: 0 18px 40px -12px rgba(0,0,0,0.55);
  --radius: 14px;
  font-size: 16px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 1200px 600px at 50% -10%, #2a2f38 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff05 39px, #ffffff05 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff05 39px, #ffffff05 40px),
    var(--bg);
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 90px;
}
.wrap{
  max-width: 860px;
  margin: 0 auto;
  padding: 28px 20px 40px;
}

/* ---------- HEADER ---------- */
header.top{
  position: relative;
  padding: 22px 24px 24px;
  margin-bottom: 18px;
  border-radius: var(--radius);
  background: linear-gradient(165deg, var(--panel) 0%, #1a1d23 100%);
  border: 1px solid #ffffff0d;
  box-shadow: var(--shadow);
  overflow: hidden;
}
header.top::before{
  content:"";
  position:absolute; inset:0;
  background: repeating-linear-gradient(135deg, #ffffff03 0 2px, transparent 2px 14px);
  pointer-events:none;
}
.plate-bolts span{
  position:absolute; width:9px; height:9px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #777e8c, #20232a 70%);
  box-shadow: inset 0 1px 1px #ffffff40, 0 1px 2px #00000080;
}
.plate-bolts span:nth-child(1){top:12px; left:12px;}
.plate-bolts span:nth-child(2){top:12px; right:12px;}
.plate-bolts span:nth-child(3){bottom:12px; left:12px;}
.plate-bolts span:nth-child(4){bottom:12px; right:12px;}

.eyebrow{
  font-family:'JetBrains Mono', monospace;
  font-size:11.5px; letter-spacing:.14em; text-transform:uppercase;
  color: var(--arc-glow);
  display:flex; align-items:center; gap:8px;
  margin-bottom: 6px;
  position:relative; z-index:1;
}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--arc); box-shadow:0 0 8px var(--arc);}
h1{
  font-family:'Oswald', sans-serif;
  font-weight:700;
  font-size: clamp(24px, 4vw, 32px);
  letter-spacing: .01em;
  margin: 0 0 6px;
  text-transform: uppercase;
  position:relative; z-index:1;
}
h1 small{
  display:block;
  font-family:'Inter',sans-serif;
  font-weight:500;
  text-transform:none;
  font-size: 14px;
  color: var(--ink-dim);
  letter-spacing:0;
  margin-top:4px;
}

.gauge{
  position:relative; z-index:1;
  margin-top:18px;
  height: 10px;
  border-radius: 6px;
  background: #14161a;
  border: 1px solid #00000060;
  box-shadow: inset 0 2px 4px #00000080;
  overflow:hidden;
}
.gauge-fill{
  height:100%;
  width:0%;
  background: linear-gradient(90deg, #ff6a1a, #ffb347);
  box-shadow: 0 0 12px #ff6a1a80;
  transition: width .4s ease;
  border-radius: 6px;
}
.gauge-readout{
  position:relative; z-index:1;
  font-family:'JetBrains Mono', monospace;
  font-size:11px; color:var(--ink-faint);
  margin-top:6px;
  letter-spacing:.05em;
}

/* ---------- STICKY ACTION BAR ---------- */
.sticky-actions{
  position: sticky; top: 0; z-index: 50;
  display:flex; gap:10px; align-items:center;
  padding: 10px 0 14px;
  margin-bottom: 8px;
  background: linear-gradient(180deg, var(--bg) 80%, transparent);
}
.btn{
  font-family:'JetBrains Mono', monospace;
  font-weight:700; font-size:13px; letter-spacing:.05em; text-transform:uppercase;
  padding:13px 22px;
  border-radius:10px; border:none; cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease;
}
.btn:active{ transform: translateY(1px); }
.btn-primary{
  background: linear-gradient(160deg, #ff6a1a, #d6500a);
  color:#fff;
  box-shadow: 0 4px 14px -4px #ff6a1a70;
}
.btn-ghost{
  background: var(--panel);
  color: var(--ink-dim);
  border:1px solid #ffffff15;
}
.btn-ghost:hover{ color:var(--ink); border-color:#ffffff35; }

/* ---------- RESULTS PANEL ---------- */
.results{
  display:none;
  background: linear-gradient(160deg, var(--panel) 0%, #1a1d23 100%);
  border: 1px solid #ffffff10;
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 22px;
  box-shadow: var(--shadow);
  align-items:center;
  gap: 28px;
  flex-wrap: wrap;
}
.result-grade{ text-align:center; flex-shrink:0; }
.grade-num{
  font-family:'Oswald', sans-serif; font-size:48px; font-weight:700;
  color: var(--arc-glow); line-height:1;
}
.grade-lbl{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); text-transform:uppercase; margin-top:4px;}
.result-breakdown{
  display:flex; gap:22px; flex-wrap:wrap; flex:1;
}
.rb{ display:flex; flex-direction:column; }
.rb-num{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:22px; }
.rb-lbl{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.05em;}
.rb.correct .rb-num{ color: var(--ok); }
.rb.wrong .rb-num{ color: var(--bad); }
.rb.blank .rb-num{ color: var(--warn); }
.rb.total .rb-num{ color: var(--ink); }

/* ---------- FILTER BAR (post submit) ---------- */
#filterBar{ display:none; margin-bottom: 18px; }
.f-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 14px; }
.f-chip{
  font-family:'JetBrains Mono', monospace;
  font-size:12px; font-weight:600;
  padding:7px 14px;
  border-radius:20px;
  border:1.5px solid var(--steel);
  background:var(--panel);
  color:var(--ink-dim);
  cursor:pointer;
}
.f-chip.active{ color:#fff; background:var(--panel-2); border-color:#ffffff40; }

/* ---------- JUMP NAV ---------- */
.jump-nav{
  display:flex; flex-wrap:wrap; gap:6px;
  margin-bottom: 22px;
  padding: 14px;
  background: var(--panel);
  border-radius: 10px;
  border: 1px solid #ffffff0a;
}
.jump-btn{
  width:30px; height:30px;
  font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600;
  border-radius:6px; border:1px solid #ffffff15; background:#1c1f25; color:var(--ink-faint);
  cursor:pointer;
}
.jump-btn.done{ background:#2a2510; color:var(--warn); border-color:#e2b13c40; }
.jump-btn.correct{ background:var(--ok-bg); color:var(--ok); border-color:#3ecf8e50; }
.jump-btn.wrong{ background:var(--bad-bg); color:var(--bad); border-color:#ef5b5b50; }
.jump-btn.blank{ background:#1c1f25; color:var(--ink-faint); border-color:#ffffff15; }

/* ---------- QUESTION CARDS ---------- */
.q-card{
  background: linear-gradient(160deg, var(--panel) 0%, #1a1d23 100%);
  border: 1px solid #ffffff0d;
  border-left: 3px solid var(--steel);
  border-radius: var(--radius);
  padding: 22px 24px 20px;
  margin-bottom: 16px;
  box-shadow: 0 8px 20px -10px rgba(0,0,0,0.4);
}
.q-card.is-correct{ background: linear-gradient(160deg, #1a221d 0%, #161a17 100%); }
.q-card.is-wrong{ background: linear-gradient(160deg, #241a1a 0%, #1a1616 100%); }
.q-tag{
  font-family:'JetBrains Mono', monospace;
  font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between;
  color: var(--ink-faint);
  margin-bottom:12px;
  flex-wrap:wrap; gap:8px;
}
.q-ud{ display:flex; align-items:center; gap:6px; }
.ud-dot{ width:7px;height:7px;border-radius:50%; }
.q-text{
  font-size:16.5px; font-weight:500; line-height:1.5;
  margin-bottom:16px;
}
.q-options{ display:flex; flex-direction:column; gap:8px; }
.opt{
  display:flex; align-items:center; gap:12px;
  padding: 11px 14px;
  border-radius: 9px;
  border: 1.5px solid #ffffff12;
  background: #1c1f25;
  cursor:pointer;
  transition: all .12s ease;
}
.opt:hover{ border-color:#ffffff30; background:#21252d; }
.opt.selected{ border-color: var(--arc); background: #2a2014; }
.opt-letter{
  font-family:'JetBrains Mono', monospace; font-weight:700; font-size:12px;
  width:24px; height:24px; flex-shrink:0;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:#14161a; color:var(--ink-dim);
  border:1px solid #ffffff15;
}
.opt.selected .opt-letter{ background: var(--arc); color:#fff; border-color:transparent; }
.opt-text{ font-size:14.5px; line-height:1.4; flex:1; color:#d7dae0; }
.opt-mark{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; width:18px; text-align:center; flex-shrink:0;}

.opt.locked{ cursor:default; }
.opt.correct-opt{ border-color: var(--ok); background: var(--ok-bg); }
.opt.correct-opt .opt-letter{ background:var(--ok); color:#0c1a14; border-color:transparent; }
.opt.correct-opt .opt-mark{ color: var(--ok); }
.opt.wrong-opt{ border-color: var(--bad); background: var(--bad-bg); }
.opt.wrong-opt .opt-letter{ background:var(--bad); color:#2a0d0d; border-color:transparent; }
.opt.wrong-opt .opt-mark{ color: var(--bad); }

.q-feedback{
  margin-top:14px;
  padding-top:14px;
  border-top: 1px dashed #ffffff15;
  font-family:'Inter', sans-serif;
  font-size:13.5px;
  color: var(--ink-dim);
  line-height:1.5;
}
.fb-ok{ color: var(--ok); font-weight:700; font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase; margin-right:4px;}
.fb-bad{ color: var(--bad); font-weight:700; font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase; margin-right:4px;}
.fb-blank{ color: var(--warn); font-weight:700; font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase; margin-right:4px;}

footer{
  text-align:center;
  margin-top: 30px;
  font-family:'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing:.05em;
}

@media (max-width: 560px){
  .wrap{ padding: 16px 12px 40px; }
  header.top{ padding:18px 16px 18px; }
  h1{ font-size: 21px; }
  .q-card{ padding:18px 16px 16px; }
  .q-text{ font-size:15.5px; }
  .opt-text{ font-size:14px; }
  .btn{ padding:12px 16px; font-size:12px; flex:1; }
  .results{ flex-direction:column; align-items:flex-start; gap:16px;}
}

:focus-visible{ outline: 2px solid var(--arc-glow); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce){
  *{ transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="plate-bolts"><span></span><span></span><span></span><span></span></div>
    <div class="eyebrow"><span class="dot"></span> UF0607 · CÁLCULO DE ELEMENTOS DE UNIÓN</div>
    <h1>Examen tipo test
      <small>129 preguntas con 4 opciones cada una · orden aleatorio en cada intento</small>
    </h1>
    <div class="gauge"><div class="gauge-fill" id="progFill"></div></div>
    <div class="gauge-readout" id="progText">0 / 129 respondidas</div>
  </header>

  <div class="sticky-actions">
    <button class="btn btn-primary" id="btnSubmit">Corregir examen</button>
    <button class="btn btn-ghost" id="btnReview" style="display:none;">Ir a revisión</button>
    <button class="btn btn-ghost" id="btnRestart">↺ Nuevo intento</button>
  </div>

  <div class="results" id="resultsPanel"></div>

  <div id="filterBar">
    <div class="f-row" id="filterChips">
      <button class="f-chip active" data-filter="todas">Todas</button>
      <button class="f-chip" data-filter="falladas">Solo falladas</button>
      <button class="f-chip" data-filter="sinResponder">Sin responder</button>
    </div>
  </div>

  <div class="jump-nav" id="jumpNav"></div>

  <form id="examForm"></form>

  <footer>
    Examen autogenerado a partir de las preguntas seleccionadas de preguntas_examen_UF0607.md · corrección y datos solo en este navegador
  </footer>
</div>

<script>
// Banco de preguntas — UF0607: Cálculo de elementos de unión
// Extraído de preguntas_examen_UF0607.md — solo preguntas marcadas aptas para tipo test

const BANCO = {
  ud1: {
    nombre: "UD1 · Soldaduras",
    abrev: "UD1",
    icono: "weld",
    color: "#ff6a1a",
    preguntas: [
      { n: 3, p: "¿Qué tres tipos de variables se identifican en la definición de variables del procedimiento de soldadura?", r: "Variables esenciales, esenciales suplementarias y no esenciales." },
      { n: 4, p: "¿Qué es la EPS preliminar y con qué código puede diseñarse?", r: "Es el documento Especificación del Procedimiento de Soldadura preliminar, donde se listan las variables y parámetros de soldadura. Puede diseñarse de acuerdo con QW-482 del código ASME, Tanques y recipientes a presión, Sección IX, 2004." },
      { n: 7, p: "¿Quiénes pueden llevar a cabo la inspección visual de una soldadura?", r: "Soldadores, supervisores de soldadura, inspectores de soldadura por parte de los contratistas, inspectores por parte de los propietarios, o inspectores reguladores." },
      { n: 9, p: "¿Qué es el RCP y para qué sirve?", r: "Es el Registro de Calificación del Procedimiento. Sirve para formalizar y documentar el procedimiento de soldadura, demostrando la compatibilidad entre metales base, materiales de aporte, procesos de soldadura y técnica aplicada. Puede diseñarse según QW-483 del código ASME Sección IX, 2004." },
      { n: 11, p: "¿Qué organismos clasificaron las propiedades del metal de aporte de los electrodos para soldadura por arco?", r: "Un comité asociado a la American Welding Society (AWS) y a la American Society of Mechanical Engineers (ASME)." },
      { n: 12, p: "¿En función de qué se deben seleccionar los electrodos de material de aporte?", r: "En función de la composición química del acero que se vaya a soldar." },
      { n: 13, p: "¿A qué se atribuyen las diferentes características de operación de los electrodos?", r: "Al revestimiento que cubre al alambre del electrodo." },
      { n: 14, p: "¿De qué tipo de acero es generalmente el alambre del electrodo y qué porcentaje de carbono tiene?", r: "Acero al carbón AISI 1010, con un porcentaje de carbono de 0,08 a 0,12%." },
      { n: 16, p: "¿A qué temperatura debe ser activo el desoxidante?", r: "A una temperatura inferior al punto de fusión de la aleación soldable." },
      { n: 17, p: "¿Qué especificación AWS rige los electrodos para soldadura de aceros al carbono?", r: "La especificación AWS A5.1." },
      { n: 18, p: "¿Qué indica la letra E en la designación de un electrodo revestido (E XXYZ)?", r: "Que se trata de un electrodo para soldadura eléctrica manual." },
      { n: 19, p: "¿Qué indican los dos primeros dígitos XX en la designación de un electrodo?", r: "La mínima resistencia a la tracción, sin tratamiento térmico post soldadura, del metal depositado, en Ksi." },
      { n: 20, p: "¿Qué indica el tercer dígito Y en la designación del electrodo?", r: "La posición en la que se puede soldar: 1 = todas las posiciones (plana, vertical, techo y horizontal); 2 = sólo posiciones planas y horizontal; 4 = posición plana y especialmente apto para vertical descendente." },
      { n: 21, p: "¿Qué indica el último dígito Z en la designación del electrodo?", r: "El tipo de corriente eléctrica y polaridad en la que mejor trabaja el electrodo, e identifica el tipo de revestimiento." },
      { n: 22, p: "¿Qué tipo de revestimiento tiene el electrodo E 6010 y qué porcentaje aproximado tiene?", r: "Revestimiento celulósico, con aproximadamente un 30% o más de celulosa." },
      { n: 23, p: "¿Qué indica el sufijo H4, H8 o H16 en la designación de un electrodo?", r: "Que el electrodo cumple los requisitos de la prueba de hidrógeno difusible para niveles de 4, 8 o 16 ml de H2 por 100 g de metal depositado (solo para electrodos de bajo hidrógeno)." },
      { n: 24, p: "¿Qué indica el sufijo R en la designación de un electrodo?", r: "Que el electrodo cumple los requisitos de la prueba de absorción de humedad a 80°F y 80% de humedad relativa (solo para electrodos de bajo hidrógeno)." },
      { n: 25, p: "¿Qué especificación AWS rige los electrodos para aceros de baja aleación?", r: "La especificación AWS A5.5." },
      { n: 26, p: "¿En qué se diferencia la designación de los electrodos AWS A5.5 respecto a los AWS A5.1?", r: "En que en lugar de los códigos opcionales tras el guión, utiliza sufijos de una letra o letra y número (A1, B1, B2, C1, G, M, etc.) que indican el porcentaje aproximado de aleación en el depósito de soldadura." },
      { n: 27, p: "¿Qué especificación AWS rige los electrodos para aceros inoxidables?", r: "La especificación AWS A5.4." },
      { n: 28, p: "¿Qué indica la numeración XXX en la designación E XXX-YZ para electrodos de acero inoxidable?", r: "La numeración que se corresponde a la clase AISI de acero inoxidable para el cual está destinado el electrodo." },
      { n: 29, p: "¿Qué significa el último dígito 5 en la designación de un electrodo para acero inoxidable?", r: "Que el electrodo tiene revestimiento alcalino y debe utilizarse únicamente con corriente continua y polaridad inversa." },
      { n: 30, p: "¿Qué significa el último dígito 6 en la designación de un electrodo para acero inoxidable?", r: "Que el electrodo tiene revestimiento de titanio y puede emplearse con corriente alterna o corriente continua con polaridad inversa." },
      { n: 31, p: "¿Qué significan las letras ELC al final de la denominación de un electrodo para inoxidable?", r: "Que el depósito del electrodo tiene un bajo contenido de carbono (E: extra; L: bajo/low; C: carbono)." },
      { n: 32, p: "¿Qué especificación AWS rige los electrodos para metales no ferrosos?", r: "La especificación AWS A5.15." },
      { n: 33, p: "¿Qué sistema de clasificación se usa para electrodos de metales no ferrosos?", r: "Un sistema simbólico que indica el símbolo químico de los elementos metálicos predominantes en el núcleo del electrodo, con el prefijo E seguido de los elementos significativos." },
      { n: 34, p: "¿Qué indica la denominación E Cu Sn A?", r: "Que el electrodo está compuesto básicamente de cobre (Cu) y estaño (Sn)." },
      { n: 35, p: "¿Cómo termina la denominación de electrodos para soldadura de hierro fundido?", r: "Con las letras CI. Por ejemplo: E Ni-CI, E Ni Fe-CI." },
      { n: 36, p: "¿Qué especificación AWS rige los electrodos para proceso de arco sumergido para aceros al carbono?", r: "La especificación AWS A5.17." },
      { n: 37, p: "¿Qué indican las letras L, M y H en la designación de electrodos para arco sumergido?", r: "El contenido de manganeso: L = bajo, M = medio, H = alto." },
      { n: 38, p: "¿Qué indica la letra K al final de la designación de un electrodo para arco sumergido?", r: "Que es un producto obtenido de un acero calmado al silicio." },
      { n: 39, p: "En la denominación F6A2 EM12K, ¿qué significa cada término?", r: "F = Fundente; 6 = 60.000 psi de resistencia a la tracción mínima; A = propiedades obtenidas sin tratamiento post soldadura (as welded); 2 = resistencia al impacto de 27 J mínimo a -20°F; E = Electrodo; M = contenido medio de manganeso; 12 = 0,12% de carbono nominal; K = acero calmado." },
      { n: 41, p: "¿Qué especificación AWS rige el material de aporte para procesos MIG/MAG, TIG y plasma?", r: "La especificación AWS A5.18." },
      { n: 42, p: "¿Qué forma tiene la designación de los electrodos para soldadura al arco con gas?", r: "ERXX-SX." },
      { n: 43, p: "¿Qué indica la letra E en la designación ERXX-SX?", r: "Electrodo para soldadura por arco (solo caso MIG/MAG)." },
      { n: 44, p: "¿Qué indica la letra R en la designación ERXX-SX?", r: "Aporte que funde por un medio diferente al que conduce la corriente del arco eléctrico (solo caso TIG y plasma)." },
      { n: 45, p: "¿Qué indica la letra S en la designación ERXX-SX?", r: "Que el electrodo es sólido." },
      { n: 46, p: "¿Cuáles son las máximas autoridades en el mundo de la soldadura que dictan las normas de clasificación de electrodos más reconocidas internacionalmente?", r: "La AWS (American Welding Society) y la ASME (American Society of Mechanical Engineers)." },
      { n: 47, p: "¿Cuáles son los dos grandes tipos de uniones soldadas según la posición relativa de las chapas?", r: "Soldaduras en ángulo y soldaduras a tope." },
      { n: 48, p: "¿Qué caracteriza a las soldaduras en ángulo respecto a la preparación de bordes?", r: "No se realiza ningún tipo de preparación en los bordes de las piezas a unir antes de soldar; la penetración se debe exclusivamente a la fusión generada durante el proceso." },
      { n: 49, p: "¿Qué diferencia hay entre una soldadura a tope de penetración completa y una de penetración parcial?", r: "En la de penetración completa, la fusión y mezcla entre el material base y el de aportación alcanza a todo el espesor de la unión. En la de penetración parcial, esta fusión no alcanza a todo el espesor." },
      { n: 50, p: "Según el CTE y la NBE EA-95, ¿cuándo no requieren cálculo las soldaduras a tope?", r: "Cuando son realizadas correctamente, es decir, ejecutadas continuas en toda su longitud y a penetración total." },

<script>
// app-test.js — lógica del examen tipo test UF0607
(function(){
  "use strict";

  const UD_KEYS = Object.keys(BANCO);

  // ---- Construir lista plana de preguntas con metadatos ----
  let ALL = [];
  UD_KEYS.forEach(key => {
    const ud = BANCO[key];
    ud.preguntas.forEach(q => {
      ALL.push({ id: key + "-" + q.n, ud: key, udNombre: ud.nombre, udAbrev: ud.abrev, color: ud.color, n: q.n, p: q.p, r: q.r });
    });
  });

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  // ---- Generar distractores: prioriza respuestas de la misma UD, completa con el resto si hace falta ----
  function buildOptions(question){
    const sameUd = ALL.filter(q => q.ud === question.ud && q.id !== question.id);
    const others = ALL.filter(q => q.ud !== question.ud);
    const pool = shuffle(sameUd).concat(shuffle(others));
    const distractors = [];
    const seen = new Set([question.r]);
    for(const cand of pool){
      if(distractors.length >= 3) break;
      if(seen.has(cand.r)) continue;
      seen.add(cand.r);
      distractors.push(cand.r);
    }
    const options = shuffle([question.r, ...distractors]);
    return options;
  }

  // ---- Construir el examen completo (orden de preguntas aleatorio, opciones fijas por intento) ----
  let examQuestions = [];
  let answers = {};      // id -> opción elegida (texto)
  let submitted = false;

  function buildExam(){
    const order = shuffle(ALL);
    examQuestions = order.map(q => ({
      ...q,
      options: buildOptions(q)
    }));
    answers = {};
    submitted = false;
  }

  // ---- DOM refs ----
  const $ = sel => document.querySelector(sel);
  const examForm = $("#examForm");
  const summaryBar = $("#summaryBar");
  const progFill = $("#progFill");
  const progText = $("#progText");
  const resultsPanel = $("#resultsPanel");
  const btnSubmit = $("#btnSubmit");
  const btnRestart = $("#btnRestart");
  const btnReview = $("#btnReview");
  const filterChips = $("#filterChips");
  const jumpNav = $("#jumpNav");

  let activeFilter = "todas"; // todas | sinResponder | falladas

  function letterFor(i){ return ["A","B","C","D"][i]; }

  function renderExam(){
    examForm.innerHTML = "";
    jumpNav.innerHTML = "";

    examQuestions.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "q-card";
      card.id = "q-" + q.id;
      card.style.borderLeftColor = q.color;

      const chosen = answers[q.id];
      const isCorrect = submitted ? (chosen === q.r) : null;
      if(submitted){
        card.classList.add(isCorrect ? "is-correct" : (chosen ? "is-wrong" : "is-blank"));
      }

      const tag = document.createElement("div");
      tag.className = "q-tag";
      tag.innerHTML = `
        <span class="q-ud"><span class="ud-dot" style="background:${q.color}"></span>${q.udAbrev}</span>
        <span class="q-num">Pregunta ${idx+1} de ${examQuestions.length} · #${q.n}</span>
      `;
      card.appendChild(tag);

      const ptext = document.createElement("div");
      ptext.className = "q-text";
      ptext.textContent = q.p;
      card.appendChild(ptext);

      const opts = document.createElement("div");
      opts.className = "q-options";

      q.options.forEach((opt, oi) => {
        const optWrap = document.createElement("label");
        optWrap.className = "opt";
        optWrap.dataset.value = opt;

        if(submitted){
          if(opt === q.r) optWrap.classList.add("correct-opt");
          else if(opt === chosen) optWrap.classList.add("wrong-opt");
          optWrap.classList.add("locked");
        } else if(chosen === opt){
          optWrap.classList.add("selected");
        }

        optWrap.innerHTML = `
          <span class="opt-letter">${letterFor(oi)}</span>
          <span class="opt-text">${opt}</span>
          <span class="opt-mark">${submitted ? (opt === q.r ? "✓" : (opt === chosen ? "✕" : "")) : ""}</span>
        `;

        if(!submitted){
          optWrap.addEventListener("click", () => {
            answers[q.id] = opt;
            renderOptionsOnly(card, q);
            renderSummary();
            renderJumpNav();
          });
        }

        opts.appendChild(optWrap);
      });

      card.appendChild(opts);

      if(submitted){
        const fb = document.createElement("div");
        fb.className = "q-feedback";
        if(isCorrect){
          fb.innerHTML = `<span class="fb-ok">✓ Correcta</span>`;
        } else if(chosen){
          fb.innerHTML = `<span class="fb-bad">✕ Incorrecta</span> — Respuesta correcta: <strong>${q.r}</strong>`;
        } else {
          fb.innerHTML = `<span class="fb-blank">— Sin responder</span> — Respuesta correcta: <strong>${q.r}</strong>`;
        }
        card.appendChild(fb);
      }

      examForm.appendChild(card);

      const jumpBtn = document.createElement("button");
      jumpBtn.type = "button";
      jumpBtn.className = "jump-btn";
      jumpBtn.textContent = idx + 1;
      jumpBtn.title = "Pregunta " + (idx+1);
      jumpBtn.addEventListener("click", () => {
        document.getElementById("q-" + q.id).scrollIntoView({behavior:"smooth", block:"center"});
      });
      jumpNav.appendChild(jumpBtn);
    });

    renderJumpNav();
    applyFilter();
  }

  function renderOptionsOnly(card, q){
    const opts = card.querySelectorAll(".opt");
    opts.forEach(o => {
      o.classList.toggle("selected", o.dataset.value === answers[q.id]);
    });
  }

  function renderJumpNav(){
    const btns = jumpNav.querySelectorAll(".jump-btn");
    btns.forEach((btn, idx) => {
      const q = examQuestions[idx];
      btn.classList.remove("done", "blank", "correct", "wrong");
      if(submitted){
        const chosen = answers[q.id];
        if(chosen === q.r) btn.classList.add("correct");
        else if(chosen) btn.classList.add("wrong");
        else btn.classList.add("blank");
      } else if(answers[q.id]){
        btn.classList.add("done");
      }
    });
  }

  function renderSummary(){
    const total = examQuestions.length;
    const answered = Object.keys(answers).length;
    const pct = total ? Math.round((answered/total)*100) : 0;
    progFill.style.width = pct + "%";
    progText.textContent = `${answered} / ${total} respondidas`;

    if(submitted){
      const correct = examQuestions.filter(q => answers[q.id] === q.r).length;
      const wrong = examQuestions.filter(q => answers[q.id] && answers[q.id] !== q.r).length;
      const blank = total - correct - wrong;
      const nota = total ? (correct / total * 10).toFixed(1) : "0.0";

      resultsPanel.style.display = "flex";
      resultsPanel.innerHTML = `
        <div class="result-grade">
          <div class="grade-num">${nota}</div>
          <div class="grade-lbl">sobre 10</div>
        </div>
        <div class="result-breakdown">
          <div class="rb correct"><span class="rb-num">${correct}</span><span class="rb-lbl">Correctas</span></div>
          <div class="rb wrong"><span class="rb-num">${wrong}</span><span class="rb-lbl">Falladas</span></div>
          <div class="rb blank"><span class="rb-num">${blank}</span><span class="rb-lbl">En blanco</span></div>
          <div class="rb total"><span class="rb-num">${total}</span><span class="rb-lbl">Total</span></div>
        </div>
      `;
    } else {
      resultsPanel.style.display = "none";
    }
  }

  function applyFilter(){
    const cards = examForm.querySelectorAll(".q-card");
    cards.forEach((card, idx) => {
      const q = examQuestions[idx];
      const chosen = answers[q.id];
      let show = true;
      if(activeFilter === "sinResponder") show = !chosen;
      if(activeFilter === "falladas") show = submitted && chosen && chosen !== q.r;
      card.style.display = show ? "" : "none";
    });
  }

  // ---- Filtros de revisión ----
  filterChips.addEventListener("click", (e) => {
    const chip = e.target.closest(".f-chip");
    if(!chip) return;
    filterChips.querySelectorAll(".f-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeFilter = chip.dataset.filter;
    applyFilter();
  });

  // ---- Submit / restart ----
  btnSubmit.addEventListener("click", () => {
    const total = examQuestions.length;
    const answered = Object.keys(answers).length;
    if(answered < total){
      const missing = total - answered;
      const ok = confirm(`Te faltan ${missing} pregunta(s) por responder. ¿Quieres corregir el examen igualmente?`);
      if(!ok) return;
    }
    submitted = true;
    renderExam();
    renderSummary();
    btnSubmit.style.display = "none";
    btnReview.style.display = "";
    document.getElementById("filterBar").style.display = "block";
    window.scrollTo({top:0, behavior:"smooth"});
  });

  btnRestart.addEventListener("click", () => {
    const ok = confirm("¿Seguro que quieres reiniciar el examen? Se perderán las respuestas actuales y se generará un nuevo orden de preguntas y opciones.");
    if(!ok) return;
    buildExam();
    btnSubmit.style.display = "";
    btnReview.style.display = "none";
    document.getElementById("filterBar").style.display = "none";
    activeFilter = "todas";
    filterChips.querySelectorAll(".f-chip").forEach(c => c.classList.remove("active"));
    filterChips.querySelector('[data-filter="todas"]').classList.add("active");
    renderExam();
    renderSummary();
    window.scrollTo({top:0, behavior:"smooth"});
  });

  btnReview.addEventListener("click", () => {
    document.getElementById("filterBar").scrollIntoView({behavior:"smooth", block:"start"});
  });

  // ---- Init ----
  buildExam();
  renderExam();
  renderSummary();

})();

</script>
</body>
</html>
